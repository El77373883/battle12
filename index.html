<!DOCTYPE html>
<html lang="es">
<head>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      user-select: none;

    }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;

      top: 0;
      left: 0;
      z-index: 1;
    }
    
    #game-ui {

      top: 0;
      left: 0;

      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

      position: absolute;

      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;

      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.8);
      padding: 8px 15px;
      border-radius: 25px;
      backdrop-filter: blur(20px);

    .avatar-circle {
      width: 45px;
      height: 45px;
      border-radius: 50%;

      align-items: center;
      justify-content: center;

    .chat-bar {

      right: 20px;

      border-radius: 20px;

      pointer-events: auto;

  <script type="module">
    import * as THREE from 'three';

    const State = { LOBBY: 'LOBBY', WAITING: 'WAITING', PLANE: 'PLANE', PLAYING: 'PLAYING' };
    let currentState = State.LOBBY;
    
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.0003);
    
    const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.5, 500);
    camera.position.set(0, 4, 7);
    
    // Iluminación mejorada
    const ambientLight = new THREE.AmbientLight(0x8899aa, 0.7);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.4);
    sunLight.position.set(60, 50, 40);
    sunLight.castShadow = true;
    sunLight.receiveShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 1;
    sunLight.shadow.camera.far = 250;
    sunLight.shadow.camera.left = -70;
    sunLight.shadow.camera.right = 70;
    sunLight.shadow.camera.top = 70;
    sunLight.shadow.camera.bottom = -70;
    scene.add(sunLight);
    
    const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x3a5a3a, 0.5);
    scene.add(hemisphereLight);
    
    let lobbyModel, playerModel, parachuteModel, planeGroup;
    let localPlayer = {
      position: new THREE.Vector3(0, 50, 0),
      velocity: new THREE.Vector3(0, 0, 0),
      inPlane: true,
      parachuteOpen: false,
      onGround: false
    };
    
    let cameraYaw = 0, cameraPitch = 0.2;
    let moveInput = { x: 0, y: 0 };
    let joystickActive = false, joystickId = null;
    let lobbyTime = 0;
    let obstacles = [];
    
    const joystickContainer = document.getElementById('joystick-container');
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const jumpBtn = document.getElementById('jump-btn');
    const minimapContainer = document.getElementById('minimap-container');

    const ctxMinimap = minimapCanvas.getContext('2d');
    const bottomPanel = document.getElementById('bottom-panel');

    const bgMusic = document.getElementById('bg-music');
    
    // Sistema de música con archive.org
    let isMusicPlaying = false;
    
    bgMusic.volume = 0.4;
    bgMusic.loop = true;
    
    function toggleMusic() {
      if (isMusicPlaying) {
        bgMusic.pause();
        musicToggle.textContent = '🔇';
        isMusicPlaying = false;
      } else {
        bgMusic.play().catch(err => {
          console.log('Error al reproducir música:', err);
        });
        musicToggle.textContent = '🔊';
        isMusicPlaying = true;
      }
    }
    
    musicToggle.addEventListener('click', toggleMusic);
    
    // Intentar reproducir automáticamente al cargar (puede ser bloqueado por el navegador)
    bgMusic.play().then(() => {
      isMusicPlaying = true;
      musicToggle.textContent = '🔊';
    }).catch(() => {
      isMusicPlaying = false;
      musicToggle.textContent = '🔇';
    });

    // Paracaídas realista
    function createRealisticParachute() {
      const group = new THREE.Group();
      
      // Tela del paracaídas
      const segments = 12;
      for (let i = 0; i < segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const nextAngle = ((i + 1) / segments) * Math.PI * 2;
        
        const panelGeo = new THREE.BufferGeometry();
        const vertices = new Float32Array([
          0, 3, 0,
          Math.cos(angle) * 2.5, 0, Math.sin(angle) * 2.5,
          Math.cos(nextAngle) * 2.5, 0, Math.sin(nextAngle) * 2.5
        ]);
        panelGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        panelGeo.computeVertexNormals();
        
        const colors = [0xff4444, 0xff8800, 0xffcc00, 0xffffff, 0xff4444, 0xff8800, 
                        0xffcc00, 0xffffff, 0xff4444, 0xff8800, 0xffcc00, 0xffffff];
        const panelMat = new THREE.MeshStandardMaterial({ 
          color: colors[i], 
          side: THREE.DoubleSide, 
          transparent: true, 
          opacity: 0.85,
          roughness: 0.4
        });
        const panel = new THREE.Mesh(panelGeo, panelMat);
        group.add(panel);
      }
      
      // Cuerdas
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const ropeGeo = new THREE.CylinderGeometry(0.02, 0.02, 3.5, 4);
        const rope = new THREE.Mesh(ropeGeo, new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
        rope.position.set(Math.cos(angle) * 1.8, 1.5, Math.sin(angle) * 1.8);
        rope.rotation.z = Math.PI/2;
        rope.rotation.y = angle;
        group.add(rope);
      }
      
      return group;
    }
    
    // Avión REALISTA
    function createRealisticPlane() {
      const group = new THREE.Group();
      
      // Fuselaje
      const fuselageGeo = new THREE.CylinderGeometry(0.8, 0.9, 7, 12);
      const fuselageMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.1, metalness: 0.7 });
      const fuselage = new THREE.Mesh(fuselageGeo, fuselageMat);
      fuselage.rotation.x = Math.PI/2;
      group.add(fuselage);
      
      // Nariz
      const noseGeo = new THREE.SphereGeometry(0.9, 12, 6, 0, Math.PI*2, 0, Math.PI/2);
      const noseMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 0.7 });
      const nose = new THREE.Mesh(noseGeo, noseMat);
      nose.position.z = 3.5;
      nose.rotation.x = Math.PI/2;
      group.add(nose);
      
      // Cola
      const tailGeo = new THREE.ConeGeometry(0.9, 2, 8);
      const tailMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.1, metalness: 0.7 });
      const tail = new THREE.Mesh(tailGeo, tailMat);
      tail.position.z = -3.5;
      tail.rotation.x = -Math.PI/2;
      group.add(tail);
      
      // Alas principales
      const mainWingGeo = new THREE.BoxGeometry(7, 0.15, 1.8);
      const mainWingMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.1, metalness: 0.7 });
      const mainWing = new THREE.Mesh(mainWingGeo, mainWingMat);
      mainWing.position.set(0, 0.3, -0.5);
      group.add(mainWing);
      
      // Estabilizadores traseros
      const tailWingGeo = new THREE.BoxGeometry(3.5, 0.1, 0.8);
      const tailWingMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.1, metalness: 0.7 });
      const tailWing = new THREE.Mesh(tailWingGeo, tailWingMat);
      tailWing.position.set(0, 0.3, -3);
      group.add(tailWing);
      
      // Estabilizador vertical
      const verticalFinGeo = new THREE.BoxGeometry(0.15, 1.5, 1.2);
      const verticalFinMat = new THREE.MeshStandardMaterial({ color: 0xdd2222, roughness: 0.1, metalness: 0.5 });
      const verticalFin = new THREE.Mesh(verticalFinGeo, verticalFinMat);
      verticalFin.position.set(0, 1, -3);
      group.add(verticalFin);
      
      // Motores
      const engineGeo = new THREE.CylinderGeometry(0.4, 0.45, 1.5, 8);
      const engineMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.2, metalness: 0.8 });
      const leftEngine = new THREE.Mesh(engineGeo, engineMat);
      leftEngine.position.set(-2, -0.5, -0.5);
      leftEngine.rotation.x = Math.PI/2;
      group.add(leftEngine);
      const rightEngine = new THREE.Mesh(engineGeo, engineMat);
      rightEngine.position.set(2, -0.5, -0.5);
      rightEngine.rotation.x = Math.PI/2;
      group.add(rightEngine);
      
      // Ventanas
      for (let i = 0; i < 6; i++) {
        const windowGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 8);
        const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, emissive: new THREE.Color(0x112233) });
        const window = new THREE.Mesh(windowGeo, windowMat);
        window.position.set(0, 0.7, -2 + i * 1);
        window.rotation.x = Math.PI/2;
        group.add(window);
      }
      
      return group;
    }
    
    // Crear mundo hermoso
    function createBeautifulWorld() {
      // Suelo principal
      const groundGeo = new THREE.CircleGeometry(120, 64);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a7c4f, roughness: 0.8 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI/2;
      ground.position.y = -0.1;
      ground.receiveShadow = true;
      scene.add(ground);
      
      // Hierba decorativa
      for (let i = 0; i < 200; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 5 + Math.random() * 80;
        const grassGeo = new THREE.ConeGeometry(0.1, 0.5, 4);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x3a6a3a });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.position.set(Math.cos(angle)*dist, 0.15, Math.sin(angle)*dist);
        grass.castShadow = true;
        scene.add(grass);
      }
      
      // Montañas
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const distance = 45 + Math.random() * 40;
        const height = 12 + Math.random() * 25;
        
        const mountainGroup = new THREE.Group();
        const bodyGeo = new THREE.ConeGeometry(6 + Math.random() * 8, height, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x5a7d5a, roughness: 0.6 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = height/2;
        body.castShadow = true;
        body.receiveShadow = true;
        mountainGroup.add(body);
        
        if (height > 25) {
          const snowGeo = new THREE.ConeGeometry(2.5, 4, 8);
          const snowMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
          const snow = new THREE.Mesh(snowGeo, snowMat);
          snow.position.y = height - 2;
          mountainGroup.add(snow);
        }
        
        mountainGroup.position.set(Math.cos(angle)*distance, 0, Math.sin(angle)*distance);
        scene.add(mountainGroup);
        obstacles.push({ position: new THREE.Vector3(Math.cos(angle)*distance, 0, Math.sin(angle)*distance), radius: 10, height: height });
      }
      
      // Árboles GRANDES con colisión
      for (let i = 0; i < 50; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = 15 + Math.random() * 65;
        const treeGroup = new THREE.Group();
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.7, 5, 8);
        const trunk = new THREE.Mesh(trunkGeo, new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 }));
        trunk.position.y = 2.5; trunk.castShadow = true; trunk.receiveShadow = true; treeGroup.add(trunk);
        const foliageGeo = new THREE.ConeGeometry(2.5, 6, 8);
        const foliage = new THREE.Mesh(foliageGeo, new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.5 }));
        foliage.position.y = 6; foliage.castShadow = true; treeGroup.add(foliage);
        const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(2, 5, 8), new THREE.MeshStandardMaterial({ color: 0x3a6a3a, roughness: 0.5 }));
        foliage2.position.y = 8; treeGroup.add(foliage2);
        const x = Math.cos(angle) * distance;
        const z = Math.sin(angle) * distance;
        treeGroup.position.set(x, 0, z);
        scene.add(treeGroup);
        obstacles.push({ position: new THREE.Vector3(x, 0, z), radius: 1.5, height: 10 });
      }
      
      // Casas GRANDES con colisión
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const distance = 20 + Math.random() * 50;
        const houseGroup = new THREE.Group();
        const wallGeo = new THREE.BoxGeometry(5, 5, 5);
        const wall = new THREE.Mesh(wallGeo, new THREE.MeshStandardMaterial({ color: 0xd4c5b2, roughness: 0.7 }));
        wall.position.y = 2.5; wall.castShadow = true; wall.receiveShadow = true; houseGroup.add(wall);
        const roofGeo = new THREE.ConeGeometry(4, 2.5, 4);
        const roof = new THREE.Mesh(roofGeo, new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.5 }));
        roof.position.y = 5; roof.castShadow = true; houseGroup.add(roof);
        const doorGeo = new THREE.BoxGeometry(1, 2.5, 0.2);
        const door = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.4 }));
        door.position.set(0, 1.25, 2.5); houseGroup.add(door);
        const x = Math.cos(angle) * distance;
        const z = Math.sin(angle) * distance;
        houseGroup.position.set(x, 0, z);
        houseGroup.rotation.y = Math.random() * Math.PI * 2;
        scene.add(houseGroup);
        obstacles.push({ position: new THREE.Vector3(x, 0, z), radius: 3.5, height: 7 });
      }
    }
    
    function checkCollision(newPos) {
      for (const obstacle of obstacles) {
        const dx = newPos.x - obstacle.position.x;
        const dz = newPos.z - obstacle.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < obstacle.radius && newPos.y < obstacle.height) {
          const angle = Math.atan2(dz, dx);
          newPos.x = obstacle.position.x + Math.cos(angle) * (obstacle.radius + 0.5);
          newPos.z = obstacle.position.z + Math.sin(angle) * (obstacle.radius + 0.5);
          return true;
        }
      }
      return false;
    }
    
    function setupLobby() {
      if (lobbyModel) scene.remove(lobbyModel);
      lobbyModel = createProCharacter(0xff5500);
      lobbyModel.position.set(0, 0.3, 0);
      scene.add(lobbyModel);
      camera.position.set(0, 3.5, 5.5);
      camera.lookAt(0, 2, 0);
    }
    
    function startPlaneSequence() {
      currentState = State.PLANE;
      if (lobbyModel) scene.remove(lobbyModel);
      planeGroup = createRealisticPlane();
      planeGroup.position.set(-60, 60, -60);
      planeGroup.rotation.y = Math.PI/4;
      planeGroup.rotation.z = -0.05;
      planeGroup.rotation.x = 0.05;
      scene.add(planeGroup);
      localPlayer.inPlane = true;
      localPlayer.parachuteOpen = false;
      localPlayer.onGround = false;
      planeHud.style.display = 'block';
      jumpBtn.style.display = 'flex';
      minimapContainer.style.display = 'block';
      joystickContainer.style.display = 'none';
      bottomPanel.style.display = 'none';
      chatBar.style.display = 'none';
      topBar.style.display = 'none';
      camera.position.copy(planeGroup.position.clone().add(new THREE.Vector3(0, 10, 20)));
      camera.lookAt(planeGroup.position);
    }
    
    function jumpFromPlane() {
      if (!localPlayer.inPlane) return;
      localPlayer.inPlane = false;
      localPlayer.parachuteOpen = true;
      localPlayer.position.copy(planeGroup.position);
      localPlayer.velocity.set(0, -0.5, 0);
      planeHud.style.display = 'none';
      jumpBtn.style.display = 'none';
      joystickContainer.style.display = 'block';
      currentState = State.PLAYING;
      if (planeGroup) { scene.remove(planeGroup); planeGroup = null; }
      if (playerModel) scene.remove(playerModel);
      playerModel = createProCharacter(0x00aa88);
      playerModel.position.copy(localPlayer.position);
      scene.add(playerModel);
      parachuteModel = createRealisticParachute();
      parachuteModel.position.copy(playerModel.position);
      parachuteModel.position.y += 3.5;
      scene.add(parachuteModel);
    }
    
    // Controles
    joystickBase.addEventListener('pointerdown', (e) => { e.preventDefault(); joystickActive = true; joystickId = e.pointerId; });
    joystickBase.addEventListener('pointermove', (e) => {
      if (!joystickActive || e.pointerId !== joystickId) return;
      e.preventDefault();
      const rect = joystickBase.getBoundingClientRect();
      const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
      let dx = e.clientX - cx, dy = e.clientY - cy;
      const dist = Math.min(60, Math.sqrt(dx*dx + dy*dy));
      const angle = Math.atan2(dy, dx);
      const tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
      joystickThumb.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
      moveInput.x = tx / 60; moveInput.y = ty / 60;
    });
    joystickBase.addEventListener('pointerup', () => { joystickActive = false; joystickThumb.style.transform = 'translate(-50%, -50%)'; moveInput.x = 0; moveInput.y = 0; });
    jumpBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); jumpFromPlane(); });
    
    canvas.addEventListener('touchmove', (e) => {
      if (currentState === State.PLAYING || currentState === State.PLANE) {
        e.preventDefault();
        if (e.touches.length === 1 && !joystickActive) {
          cameraYaw -= (e.touches[0].movementX || 0) * 0.004;
          cameraPitch -= (e.touches[0].movementY || 0) * 0.004;
          cameraPitch = Math.max(-0.8, Math.min(0.5, cameraPitch));
        }
      }
    }, { passive: false });
    
    // Eventos de menú
    document.getElementById('start-btn').addEventListener('click', () => {
      currentState = State.WAITING;
      bottomPanel.innerHTML = `<div style="text-align:center; color:white; padding:20px;"><div style="font-size:3rem; font-weight:900; color:#ffaa00; margin:15px;" id="timer-display">30</div><div style="margin:10px; font-size:15px;">👥 Jugadores listos: 50/50</div><div style="margin:10px; font-size:13px; color:#aaa;">Preparando sala de espera...</div><button class="start-btn" id="cancel-waiting" style="background:gray; margin-top:15px;">CANCELAR</button></div>`;
      let sec = 30;
      const timerEl = document.getElementById('timer-display');
      const interval = setInterval(() => {
        sec--; timerEl.textContent = sec;
        if (sec <= 0) { clearInterval(interval); startPlaneSequence(); }
      }, 1000);
      document.getElementById('cancel-waiting').onclick = () => { clearInterval(interval); location.reload(); };
    });
    
    document.getElementById('menu-tienda').addEventListener('click', () => alert('🛒 TIENDA - Skins exclusivas'));
    document.getElementById('menu-luck').addEventListener('click', () => alert('🎰 LUCK ROYALE - ¡Gira y gana!'));
    document.getElementById('menu-pase').addEventListener('click', () => alert('👑 PASE BOOYAH - Recompensas premium'));
    document.getElementById('menu-misiones').addEventListener('click', () => alert('📋 MISIONES DIARIAS - Completa objetivos'));
    document.getElementById('menu-eventos').addEventListener('click', () => alert('🎪 EVENTOS - Participa ahora'));
    
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    
    function updateGame(delta) {
      if (currentState === State.LOBBY && lobbyModel) {
        lobbyTime += delta;
        lobbyModel.position.y = 0.3 + Math.sin(lobbyTime * 1.5) * 0.06;
        lobbyModel.rotation.y += delta * 0.5;
        const camX = Math.sin(lobbyTime * 0.4) * 2;
        const camZ = 5.5 + Math.cos(lobbyTime * 0.4) * 1.5;
        camera.position.lerp(new THREE.Vector3(camX, 3.5, camZ), 0.03);
        camera.lookAt(0, 2.2, 0);
      }
      
      if (currentState === State.PLAYING && playerModel) {
        const speed = 10;
        const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
        const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
        const dir = forward.clone().multiplyScalar(-moveInput.y).add(right.clone().multiplyScalar(moveInput.x));
        
        if (!localPlayer.onGround) {
          if (localPlayer.parachuteOpen) {
            localPlayer.velocity.y = -2.5;
            if (moveInput.x !== 0 || moveInput.y !== 0) {
              localPlayer.position.x += dir.x * 7 * delta;
              localPlayer.position.z += dir.z * 7 * delta;
            }
            if (localPlayer.position.y <= 1.0) {
              localPlayer.position.y = 1.0;
              localPlayer.onGround = true;
              localPlayer.parachuteOpen = false;
              localPlayer.velocity.set(0, 0, 0);
              if (parachuteModel) { scene.remove(parachuteModel); parachuteModel = null; }
            }
          }
          localPlayer.position.y += localPlayer.velocity.y * delta;
        } else {
          if (dir.length() > 0) {
            dir.normalize();
            const newPos = localPlayer.position.clone();
            newPos.x += dir.x * speed * delta;
            newPos.z += dir.z * speed * delta;
            if (!checkCollision(newPos)) {
              localPlayer.position.copy(newPos);
            }
            const targetAngle = Math.atan2(dir.x, dir.z);
            playerModel.rotation.y += (targetAngle - playerModel.rotation.y) * 0.2;
          }
        }
        
        playerModel.position.copy(localPlayer.position);
        if (parachuteModel) { parachuteModel.position.copy(playerModel.position); parachuteModel.position.y += 3.5; }
        
        const camOffset = new THREE.Vector3(0, 4.5, -8).applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraYaw);
        const targetCamPos = playerModel.position.clone().add(camOffset);
        targetCamPos.y += cameraPitch * 4;
        camera.position.lerp(targetCamPos, 0.15);
        camera.lookAt(playerModel.position.x, playerModel.position.y + 2, playerModel.position.z);
      }
      
      if (currentState === State.PLANE && planeGroup) {
        planeGroup.position.x += 1.2; planeGroup.position.z += 1.2;
        if (planeGroup.position.x > 55) planeGroup.position.x = -55;
        if (planeGroup.position.z > 55) planeGroup.position.z = -55;
        const targetPos = planeGroup.position.clone().add(new THREE.Vector3(0, 8, 18));
        camera.position.lerp(targetPos, 0.1);
        camera.lookAt(planeGroup.position);
      }
      
      if (currentState === State.PLAYING || currentState === State.PLANE) {
        ctxMinimap.clearRect(0, 0, 140, 140);
        ctxMinimap.fillStyle = '#1a3a1a'; ctxMinimap.fillRect(0, 0, 140, 140);
        ctxMinimap.fillStyle = '#3a6a3a'; ctxMinimap.beginPath(); ctxMinimap.arc(70, 70, 65, 0, Math.PI * 2); ctxMinimap.fill();
        if (playerModel && currentState === State.PLAYING) {
          const px = 70 + (localPlayer.position.x / 120) * 60;
          const py = 70 + (localPlayer.position.z / 120) * 60;
          ctxMinimap.fillStyle = '#FFD700'; ctxMinimap.beginPath(); ctxMinimap.arc(px, py, 5, 0, 2 * Math.PI); ctxMinimap.fill();
          ctxMinimap.strokeStyle = 'white'; ctxMinimap.lineWidth = 2; ctxMinimap.beginPath();
          ctxMinimap.moveTo(px, py); ctxMinimap.lineTo(px + Math.sin(cameraYaw) * 10, py + Math.cos(cameraYaw) * 10); ctxMinimap.stroke();
        }
      }
    }
    
    function animate() {
      requestAnimationFrame(animate);
      updateGame(0.016);
      renderer.render(scene, camera);
    }
    
    createBeautifulWorld();
    setupLobby();
    animate();
  </script>
</body>
</html>
