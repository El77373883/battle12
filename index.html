<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>⚔️ BATTLE ROYALE MOBILE - FREE FIRE STYLE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    /* UI MÓVIL */
    #mobile-ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }
    
    /* Joystick virtual */
    #joystick-container {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 130px;
      height: 130px;
      pointer-events: auto;
      display: none;
    }
    #joystick-base {
      width: 130px;
      height: 130px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.5);
      position: relative;
      backdrop-filter: blur(5px);
    }
    #joystick-thumb {
      width: 55px;
      height: 55px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(255,200,0,0.8);
    }
    
    /* Botón saltar del avión */
    #jump-btn {
      position: absolute;
      bottom: 60px;
      right: 30px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #ffaa00, #ff5500);
      border-radius: 50%;
      border: 4px solid white;
      color: white;
      font-weight: 900;
      font-size: 16px;
      text-shadow: 0 0 10px black;
      pointer-events: auto;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255,100,0,0.9);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    /* Minimapa estilo Free Fire */
    #minimap-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 140px;
      height: 140px;
      background: rgba(0,0,0,0.7);
      border-radius: 50%;
      border: 3px solid #ffaa00;
      overflow: hidden;
      display: none;
      pointer-events: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    #minimap-canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    
    /* Indicador de zona */
    #zone-indicator {
      position: absolute;
      top: 170px;
      right: 30px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      backdrop-filter: blur(5px);
    }
    
    /* Paneles de lobby */
    .lobby-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(20,20,35,0.9);
      backdrop-filter: blur(25px);
      border-radius: 35px 35px 0 0;
      padding: 25px 20px 35px;
      color: white;
      text-align: center;
      z-index: 200;
      pointer-events: auto;
      border-top: 2px solid gold;
    }
    .lobby-title {
      font-size: 2rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 20px #ffaa00;
    }
    .gold-btn {
      background: linear-gradient(45deg, #ffd700, #ff8800);
      border: none;
      color: black;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 15px;
      border-radius: 30px;
      width: 100%;
      margin: 8px 0;
      letter-spacing: 2px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .store-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 10px 0;
    }
    .store-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 12px 18px;
      border-radius: 25px;
      font-weight: bold;
      flex: 1;
    }
    .players-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-height: 100px;
      overflow-y: auto;
    }
    .player-dot {
      width: 18px;
      height: 18px;
      background: #4caf50;
      border-radius: 50%;
      font-size: 9px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <!-- UI MÓVIL -->
  <div id="mobile-ui">
    <div id="joystick-container">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>
    <div id="jump-btn">SALTAR</div>
    <div id="minimap-container">
      <canvas id="minimap-canvas" width="140" height="140"></canvas>
    </div>
    <div id="zone-indicator">⏳ Zona segura</div>
    
    <!-- Lobby -->
    <div id="lobby-panel" class="lobby-panel">
      <div class="lobby-title">⚡BATTLE ROYALE</div>
      <div style="margin:10px 0;">🔥 SKIN ÉPICA EQUIPADA 🔥</div>
      <div class="store-row">
        <button class="store-btn" id="lucky-btn">🎰 LUCKY</button>
        <button class="store-btn" id="shop-btn">🛒 TIENDA</button>
      </div>
      <button class="gold-btn" id="start-btn">▶ INICIAR PARTIDA</button>
      <div style="color:#aaa;">50 jugadores • Mobile</div>
    </div>
    
    <!-- Sala de espera -->
    <div id="waiting-panel" class="lobby-panel" style="display:none;">
      <div class="lobby-title">⏳ SALA DE ESPERA</div>
      <div class="players-grid" id="waiting-grid"></div>
      <div style="font-size:3rem; font-weight:900; color:#ffaa00;" id="timer-display">30</div>
      <div>Jugadores: <span id="count-display">50</span>/50</div>
      <button class="store-btn" id="cancel-btn" style="margin-top:10px;">CANCELAR</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------- ESTADO ----------
    const State = { LOBBY: 'LOBBY', WAITING: 'WAITING', PLANE: 'PLANE', PLAYING: 'PLAYING' };
    let currentState = State.LOBBY;
    const TOTAL_PLAYERS = 50;
    
    // Three.js
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 40, 200);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.5, 300);
    camera.position.set(0, 6, 12);
    
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'fixed';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);
    
    // Luces
    scene.add(new THREE.AmbientLight(0x404066));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.3);
    sun.position.set(80, 60, 40);
    sun.castShadow = true;
    sun.receiveShadow = true;
    scene.add(sun);
    
    // Variables de juego
    let lobbyModel, playerModel, planeGroup;
    let localPlayer = {
      position: new THREE.Vector3(0, 5, 0),
      velocity: new THREE.Vector3(0,0,0),
      inPlane: true,
      hasParachute: false,
      onGround: false
    };
    let cameraYaw = 0, cameraPitch = 0.3;
    let moveInput = { x: 0, y: 0 };
    
    // Joystick
    let joystickActive = false;
    let joystickId = null;
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const joystickContainer = document.getElementById('joystick-container');
    
    // UI Elements
    const lobbyPanel = document.getElementById('lobby-panel');
    const waitingPanel = document.getElementById('waiting-panel');
    const jumpBtn = document.getElementById('jump-btn');
    const minimapContainer = document.getElementById('minimap-container');
    const minimapCanvas = document.getElementById('minimap-canvas');
    const ctxMinimap = minimapCanvas.getContext('2d');
    const zoneIndicator = document.getElementById('zone-indicator');
    
    // Mundo
    let ground, mountains=[], houses=[], trees=[], cars=[], weapons=[];

    function createCharacter(color=0xff5500) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.5,1.8,8), new THREE.MeshStandardMaterial({color:0x222244}));
      body.position.y=0.9; body.castShadow=true; g.add(body);
      const vest = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.55,1.2,8), new THREE.MeshStandardMaterial({color}));
      vest.position.y=1.0; vest.castShadow=true; g.add(vest);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.45,16,16), new THREE.MeshStandardMaterial({color:0xffccaa}));
      head.position.y=1.9; head.castShadow=true; g.add(head);
      const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.48,16,16), new THREE.MeshStandardMaterial({color:0x333333, metalness:0.8}));
      helmet.position.y=2.0; g.add(helmet);
      return g;
    }

    function createWorld() {
      ground = new THREE.Mesh(new THREE.CircleGeometry(100,64), new THREE.MeshStandardMaterial({color:0x3a5a3a}));
      ground.rotation.x=-Math.PI/2; ground.position.y=-0.1; ground.receiveShadow=true; scene.add(ground);
      for(let i=0;i<12;i++) {
        const a=Math.random()*Math.PI*2, d=20+Math.random()*45;
        const m=new THREE.Mesh(new THREE.ConeGeometry(3+Math.random()*5,5+Math.random()*12,8), new THREE.MeshStandardMaterial({color:0x4a6741}));
        m.position.set(Math.cos(a)*d, 2, Math.sin(a)*d); m.castShadow=true; scene.add(m); mountains.push(m);
      }
      for(let i=0;i<10;i++) {
        const a=Math.random()*Math.PI*2, d=18+Math.random()*40;
        const h=new THREE.Group();
        h.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,2,2.2), new THREE.MeshStandardMaterial({color:0xccbbaa})));
        h.add(new THREE.Mesh(new THREE.ConeGeometry(1.6,1,4), new THREE.MeshStandardMaterial({color:0x993333})));
        h.children[0].position.y=1; h.children[1].position.y=2.2;
        h.position.set(Math.cos(a)*d,0,Math.sin(a)*d); scene.add(h); houses.push(h);
      }
      for(let i=0;i<40;i++) {
        const a=Math.random()*Math.PI*2, d=8+Math.random()*55;
        const t=new THREE.Group();
        t.add(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,2), new THREE.MeshStandardMaterial({color:0x8b5a2b})));
        t.add(new THREE.Mesh(new THREE.ConeGeometry(1,2.2,8), new THREE.MeshStandardMaterial({color:0x2d5a27})));
        t.children[0].position.y=1; t.children[1].position.y=2.4;
        t.position.set(Math.cos(a)*d,0,Math.sin(a)*d); scene.add(t); trees.push(t);
      }
    }

    function setupLobby() {
      if(lobbyModel) scene.remove(lobbyModel);
      lobbyModel = createCharacter(0xff5500);
      lobbyModel.position.set(0,0.2,0);
      scene.add(lobbyModel);
      camera.position.set(0,4.5,6.5);
      camera.lookAt(0,1.8,0);
    }

    function startWaiting() {
      currentState=State.WAITING;
      lobbyPanel.style.display='none';
      waitingPanel.style.display='block';
      const grid=document.getElementById('waiting-grid');
      grid.innerHTML='';
      for(let i=0;i<TOTAL_PLAYERS;i++){const d=document.createElement('div');d.className='player-dot';d.textContent=i+1;grid.appendChild(d);}
      document.getElementById('count-display').textContent=TOTAL_PLAYERS;
      let sec=30;
      document.getElementById('timer-display').textContent=sec;
      const interval=setInterval(()=>{
        sec--; document.getElementById('timer-display').textContent=sec;
        if(sec<=0){clearInterval(interval); startPlane();}
      },1000);
      document.getElementById('cancel-btn').onclick=()=>{
        clearInterval(interval); waitingPanel.style.display='none'; lobbyPanel.style.display='block'; currentState=State.LOBBY;
      };
    }

    function startPlane() {
      waitingPanel.style.display='none';
      currentState=State.PLANE;
      if(lobbyModel) scene.remove(lobbyModel);
      planeGroup=new THREE.Group();
      const fuse=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,5,8),new THREE.MeshStandardMaterial({color:0xcccccc}));
      fuse.rotation.x=Math.PI/2; planeGroup.add(fuse);
      planeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(4.5,0.2,1),new THREE.MeshStandardMaterial({color:0xaaaaaa})));
      planeGroup.position.set(-45,45,-45); planeGroup.rotation.y=Math.PI/4;
      scene.add(planeGroup);
      localPlayer.inPlane=true; localPlayer.hasParachute=false; localPlayer.onGround=false;
      jumpBtn.style.display='flex'; minimapContainer.style.display='block'; zoneIndicator.style.display='block';
      joystickContainer.style.display='none';
    }

    function jumpFromPlane() {
      if(!localPlayer.inPlane) return;
      localPlayer.inPlane=false; localPlayer.hasParachute=true;
      localPlayer.position.copy(planeGroup.position);
      localPlayer.velocity.set(0,-2,0);
      jumpBtn.style.display='none';
      joystickContainer.style.display='block';
      currentState=State.PLAYING;
      if(planeGroup) scene.remove(planeGroup);
      if(playerModel) scene.remove(playerModel);
      playerModel=createCharacter(0x00aa88);
      playerModel.position.copy(localPlayer.position);
      scene.add(playerModel);
    }

    // Joystick handlers
    function handleJoystickStart(e) {
      e.preventDefault();
      joystickActive=true;
      joystickId=e.pointerId;
    }
    function handleJoystickMove(e) {
      if(!joystickActive || e.pointerId!==joystickId) return;
      e.preventDefault();
      const rect=joystickBase.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      let dx=e.clientX-cx, dy=e.clientY-cy;
      const dist=Math.min(55, Math.sqrt(dx*dx+dy*dy));
      const angle=Math.atan2(dy,dx);
      const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist;
      joystickThumb.style.transform=`translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
      moveInput.x=tx/55; moveInput.y=ty/55;
    }
    function handleJoystickEnd(e) {
      joystickActive=false; joystickId=null;
      joystickThumb.style.transform='translate(-50%, -50%)';
      moveInput.x=0; moveInput.y=0;
    }
    
    joystickBase.addEventListener('pointerdown', handleJoystickStart);
    joystickBase.addEventListener('pointermove', handleJoystickMove);
    joystickBase.addEventListener('pointerup', handleJoystickEnd);
    joystickBase.addEventListener('pointerleave', handleJoystickEnd);
    
    jumpBtn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); jumpFromPlane(); });
    
    // Touch look
    canvas.addEventListener('touchmove', (e)=>{
      if(currentState===State.PLAYING || currentState===State.PLANE){
        e.preventDefault();
        if(e.touches.length===1){
          cameraYaw-=e.touches[0].clientX*0.005;
          cameraPitch-=e.touches[0].clientY*0.005;
          cameraPitch=Math.max(-1.2,Math.min(0.8,cameraPitch));
        }
      }
    }, {passive: false});
    
    document.getElementById('start-btn').addEventListener('click', startWaiting);
    document.getElementById('lucky-btn').addEventListener('click',()=>alert('🎰 LUCKY ROYALE'));
    document.getElementById('shop-btn').addEventListener('click',()=>alert('🛒 TIENDA'));
    
    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateGame(delta) {
      if(currentState===State.PLAYING && playerModel){
        const speed=5.5;
        const forward=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        const right=new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        const dir=forward.clone().multiplyScalar(-moveInput.y).add(right.clone().multiplyScalar(moveInput.x));
        if(dir.length()>0){
          dir.normalize();
          localPlayer.position.x+=dir.x*speed*delta;
          localPlayer.position.z+=dir.z*speed*delta;
        }
        if(!localPlayer.onGround){
          if(localPlayer.hasParachute && localPlayer.position.y<18) localPlayer.velocity.y=-1.6;
          else if(!localPlayer.hasParachute) localPlayer.velocity.y-=9.8*delta;
          localPlayer.position.y+=localPlayer.velocity.y*delta;
          if(localPlayer.position.y<=0.15){ localPlayer.position.y=0.15; localPlayer.onGround=true; localPlayer.hasParachute=false; }
        }
        playerModel.position.copy(localPlayer.position);
        const camOff=new THREE.Vector3(0,3.2,-5.5).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        camera.position.lerp(playerModel.position.clone().add(camOff),0.25);
        camera.lookAt(playerModel.position.x, playerModel.position.y+1.4, playerModel.position.z);
      }
      if(currentState===State.PLANE && planeGroup){
        planeGroup.position.x+=0.7; planeGroup.position.z+=0.7;
        if(planeGroup.position.x>45) planeGroup.position.x=-45;
        if(planeGroup.position.z>45) planeGroup.position.z=-45;
        camera.position.lerp(planeGroup.position.clone().add(new THREE.Vector3(0,8,14)),0.15);
        camera.lookAt(planeGroup.position);
      }
      // Minimap
      if(currentState===State.PLAYING || currentState===State.PLANE){
        ctxMinimap.clearRect(0,0,140,140);
        ctxMinimap.fillStyle='#2d5a27';
        ctxMinimap.beginPath(); ctxMinimap.arc(70,70,65,0,Math.PI*2); ctxMinimap.fill();
        if(playerModel && currentState===State.PLAYING){
          const px=70+(localPlayer.position.x/100)*58;
          const py=70+(localPlayer.position.z/100)*58;
          ctxMinimap.fillStyle='white'; ctxMinimap.beginPath(); ctxMinimap.arc(px,py,5,0,2*Math.PI); ctxMinimap.fill();
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      updateGame(0.016);
      renderer.render(scene,camera);
      labelRenderer.render(scene,camera);
    }

    createWorld();
    setupLobby();
    animate();
  </script>
</body>
</html>
