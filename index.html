<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>FREE FIRE STYLE LOBBY - BATTLE ROYALE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }
    
    /* UI COMPLETA ESTILO FREE FIRE */
    #game-ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    
    /* Barra superior con nivel y monedas */
    .top-bar {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
    }
    .profile-info {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.7);
      padding: 8px 15px;
      border-radius: 25px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(45deg, #ff6600, #ff9900);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .player-name {
      color: white;
      font-weight: bold;
      font-size: 16px;
    }
    .player-level {
      color: #ffcc00;
      font-size: 12px;
    }
    .currency-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .currency-item {
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    .diamond { color: #00d4ff; }
    .gold { color: #ffd700; }
    
    /* Panel inferior estilo Free Fire */
    .bottom-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
      backdrop-filter: blur(20px);
      padding: 20px 15px 35px;
      pointer-events: auto;
    }
    .menu-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
    }
    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      font-size: 11px;
      gap: 5px;
      cursor: pointer;
      transition: 0.2s;
    }
    .menu-item:active {
      transform: scale(0.9);
    }
    .menu-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .start-btn {
      width: 100%;
      background: linear-gradient(45deg, #ff4444, #ff6600);
      border: none;
      color: white;
      font-weight: 900;
      font-size: 20px;
      padding: 18px;
      border-radius: 15px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(255,68,68,0.6);
      text-transform: uppercase;
      margin-top: 10px;
      transition: 0.2s;
    }
    .start-btn:active {
      transform: scale(0.95);
    }
    
    /* Chat inferior */
    .chat-bar {
      position: absolute;
      bottom: 200px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      padding: 10px 15px;
      color: white;
      font-size: 12px;
      backdrop-filter: blur(10px);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Joystick y botón de salto (ocultos inicialmente) */
    #joystick-container {
      position: absolute;
      bottom: 50px;
      left: 40px;
      width: 140px;
      height: 140px;
      pointer-events: auto;
      display: none;
      z-index: 20;
    }
    #joystick-base {
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.4);
      position: relative;
    }
    #joystick-thumb {
      width: 60px;
      height: 60px;
      background: rgba(255,200,0,0.8);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #jump-btn {
      position: absolute;
      bottom: 70px;
      right: 30px;
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      border-radius: 50%;
      border: 4px solid white;
      color: white;
      font-weight: 900;
      font-size: 18px;
      pointer-events: auto;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      animation: pulse 0.8s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    #minimap-container {
      position: absolute;
      top: 25px;
      right: 25px;
      width: 150px;
      height: 150px;
      background: rgba(0,0,0,0.75);
      border-radius: 50%;
      border: 3px solid #ffaa00;
      overflow: hidden;
      display: none;
      z-index: 20;
    }
    #minimap-canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  
  <div id="game-ui">
    <!-- Barra superior estilo Free Fire -->
    <div class="top-bar" id="top-bar">
      <div class="profile-info">
        <div class="avatar-circle">👤</div>
        <div>
          <div class="player-name">Naomi</div>
          <div class="player-level">NvL 30 • UID:10292439675</div>
        </div>
      </div>
      <div class="currency-row">
        <div class="currency-item diamond">💎 2,571</div>
        <div class="currency-item gold">🪙 168</div>
      </div>
    </div>
    
    <!-- Chat -->
    <div class="chat-bar" id="chat-bar">
      <span>💬</span>
      <span style="color:#ffcc00;">[Mundo]</span> invitacion de grupo • Mapa aleatorio
    </div>
    
    <!-- Panel inferior con menú -->
    <div class="bottom-panel" id="bottom-panel">
      <div class="menu-row">
        <div class="menu-item" id="menu-tienda">
          <div class="menu-icon">🛒</div>
          <span>TIENDA</span>
        </div>
        <div class="menu-item" id="menu-luck">
          <div class="menu-icon">🎰</div>
          <span>LUCK ROYALE</span>
        </div>
        <div class="menu-item" id="menu-pase">
          <div class="menu-icon">👑</div>
          <span>PASE BOOYAH</span>
        </div>
        <div class="menu-item" id="menu-misiones">
          <div class="menu-icon">📋</div>
          <span>MISIONES</span>
        </div>
        <div class="menu-item" id="menu-eventos">
          <div class="menu-icon">🎪</div>
          <span>EVENTOS</span>
        </div>
      </div>
      <button class="start-btn" id="start-btn">INICIAR PARTIDA</button>
    </div>
    
    <!-- Controles de juego (ocultos inicialmente) -->
    <div id="joystick-container">
      <div id="joystick-base"><div id="joystick-thumb"></div></div>
    </div>
    <div id="jump-btn">SALTAR</div>
    <div id="minimap-container">
      <canvas id="minimap-canvas" width="150" height="150"></canvas>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const State = { LOBBY: 'LOBBY', WAITING: 'WAITING', PLANE: 'PLANE', PLAYING: 'PLAYING' };
    let currentState = State.LOBBY;
    
    const canvas = document.getElementById('game-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a2b3c);
    scene.fog = new THREE.Fog(0x1a2b3c, 40, 200);
    
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 350);
    camera.position.set(0, 4.5, 8);
    
    scene.add(new THREE.AmbientLight(0x445566));
    const sun = new THREE.DirectionalLight(0xffeedd, 1.3);
    sun.position.set(80, 60, 40);
    sun.castShadow = true;
    scene.add(sun);
    
    let lobbyModel, playerModel, parachuteModel, planeGroup;
    let localPlayer = {
      position: new THREE.Vector3(0, 20, 0),
      velocity: new THREE.Vector3(0, 0, 0),
      inPlane: true,
      parachuteOpen: false,
      onGround: false
    };
    
    let cameraYaw = 0, cameraPitch = 0.2;
    let moveInput = { x: 0, y: 0 };
    let joystickActive = false, joystickId = null;
    
    // UI Elements
    const topBar = document.getElementById('top-bar');
    const chatBar = document.getElementById('chat-bar');
    const bottomPanel = document.getElementById('bottom-panel');
    const joystickContainer = document.getElementById('joystick-container');
    const joystickBase = document.getElementById('joystick-base');
    const joystickThumb = document.getElementById('joystick-thumb');
    const jumpBtn = document.getElementById('jump-btn');
    const minimapContainer = document.getElementById('minimap-container');
    const minimapCanvas = document.getElementById('minimap-canvas');
    const ctxMinimap = minimapCanvas.getContext('2d');
    
    function createCharacter(color = 0xff5500) {
      const g = new THREE.Group();
      g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.25,0.9,8), new THREE.MeshStandardMaterial({color:0x1a1a2e})));
      g.children[0].position.set(-0.3,0.45,0);
      g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.25,0.9,8), new THREE.MeshStandardMaterial({color:0x1a1a2e})));
      g.children[1].position.set(0.3,0.45,0);
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.45,1.4,8), new THREE.MeshStandardMaterial({color:0x223344}));
      torso.position.y=1.1; g.add(torso);
      const vest = new THREE.Mesh(new THREE.CylinderGeometry(0.52,0.48,1.1,8), new THREE.MeshStandardMaterial({color}));
      vest.position.y=1.2; g.add(vest);
      g.add(new THREE.Mesh(new THREE.SphereGeometry(0.45,16,16), new THREE.MeshStandardMaterial({color:0xffccaa})));
      g.children[g.children.length-1].position.y=2.05;
      const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.48,16,16), new THREE.MeshStandardMaterial({color:0x333333, metalness:0.8}));
      helmet.position.y=2.15; g.add(helmet);
      return g;
    }
    
    function createParachute() {
      const g = new THREE.Group();
      const canopy = new THREE.Mesh(new THREE.SphereGeometry(2.2,16,8,0,Math.PI*2,0,Math.PI/2), 
        new THREE.MeshStandardMaterial({color:0xff4400, side:THREE.DoubleSide, transparent:true, opacity:0.9}));
      canopy.rotation.x=Math.PI; canopy.position.y=2.5; g.add(canopy);
      for(let i=0;i<8;i++){
        const angle=(i/8)*Math.PI*2;
        const rope=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,2.5,4), new THREE.MeshStandardMaterial({color:0xdddddd}));
        rope.position.set(Math.cos(angle)*1.5,1.3,Math.sin(angle)*1.5);
        rope.rotation.z=Math.PI/2; rope.rotation.y=angle; g.add(rope);
      }
      return g;
    }
    
    function createWorld() {
      const ground = new THREE.Mesh(new THREE.CircleGeometry(120,64), new THREE.MeshStandardMaterial({color:0x3a5a3a}));
      ground.rotation.x=-Math.PI/2; ground.position.y=-0.1; ground.receiveShadow=true; scene.add(ground);
      for(let i=0;i<12;i++){
        const a=Math.random()*Math.PI*2, d=25+Math.random()*50;
        const m=new THREE.Mesh(new THREE.ConeGeometry(4+Math.random()*6,8+Math.random()*14,8), new THREE.MeshStandardMaterial({color:0x4a6741}));
        m.position.set(Math.cos(a)*d,4,Math.sin(a)*d); m.castShadow=true; scene.add(m);
      }
      for(let i=0;i<10;i++){
        const a=Math.random()*Math.PI*2, d=18+Math.random()*45;
        const h=new THREE.Group();
        h.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,2,2.2), new THREE.MeshStandardMaterial({color:0xccbbaa})));
        h.add(new THREE.Mesh(new THREE.ConeGeometry(1.6,1,4), new THREE.MeshStandardMaterial({color:0x993333})));
        h.children[0].position.y=1; h.children[1].position.y=2.2;
        h.position.set(Math.cos(a)*d,0,Math.sin(a)*d); scene.add(h);
      }
    }
    
    function setupLobby() {
      if(lobbyModel) scene.remove(lobbyModel);
      lobbyModel = createCharacter(0xff5500);
      lobbyModel.position.set(0,0.2,0);
      scene.add(lobbyModel);
      camera.position.set(0,4,7);
      camera.lookAt(0,1.8,0);
    }
    
    function startPlane() {
      currentState=State.PLANE;
      bottomPanel.style.display='none';
      chatBar.style.display='none';
      topBar.style.display='none';
      if(lobbyModel) scene.remove(lobbyModel);
      
      planeGroup=new THREE.Group();
      planeGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.8,6,8), new THREE.MeshStandardMaterial({color:0xcccccc})));
      planeGroup.children[0].rotation.x=Math.PI/2;
      planeGroup.add(new THREE.Mesh(new THREE.BoxGeometry(5,0.2,1.2), new THREE.MeshStandardMaterial({color:0xaaaaaa})));
      planeGroup.position.set(-50,55,-50); planeGroup.rotation.y=Math.PI/4;
      scene.add(planeGroup);
      
      localPlayer.inPlane=true; localPlayer.parachuteOpen=false; localPlayer.onGround=false;
      localPlayer.position.copy(planeGroup.position);
      
      jumpBtn.style.display='flex';
      minimapContainer.style.display='block';
      joystickContainer.style.display='none';
    }
    
    function jumpFromPlane() {
      if(!localPlayer.inPlane) return;
      localPlayer.inPlane=false; localPlayer.parachuteOpen=true;
      localPlayer.position.copy(planeGroup.position);
      localPlayer.velocity.set(0,-1.5,0);
      
      jumpBtn.style.display='none';
      joystickContainer.style.display='block';
      currentState=State.PLAYING;
      
      if(planeGroup) scene.remove(planeGroup);
      if(playerModel) scene.remove(playerModel);
      playerModel=createCharacter(0x00aa88);
      playerModel.position.copy(localPlayer.position);
      scene.add(playerModel);
      
      parachuteModel=createParachute();
      parachuteModel.position.copy(playerModel.position);
      parachuteModel.position.y+=2.5;
      scene.add(parachuteModel);
    }
    
    // Joystick
    joystickBase.addEventListener('pointerdown',(e)=>{e.preventDefault(); joystickActive=true; joystickId=e.pointerId;});
    joystickBase.addEventListener('pointermove',(e)=>{
      if(!joystickActive||e.pointerId!==joystickId) return;
      e.preventDefault();
      const rect=joystickBase.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      let dx=e.clientX-cx, dy=e.clientY-cy;
      const dist=Math.min(60,Math.sqrt(dx*dx+dy*dy));
      const angle=Math.atan2(dy,dx);
      joystickThumb.style.transform=`translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
      moveInput.x=Math.cos(angle)*dist/60; moveInput.y=Math.sin(angle)*dist/60;
    });
    joystickBase.addEventListener('pointerup',()=>{joystickActive=false; joystickThumb.style.transform='translate(-50%,-50%)'; moveInput.x=0; moveInput.y=0;});
    
    jumpBtn.addEventListener('pointerdown',(e)=>{e.preventDefault(); jumpFromPlane();});
    
    canvas.addEventListener('touchmove',(e)=>{
      if(currentState===State.PLAYING||currentState===State.PLANE){
        e.preventDefault();
        if(e.touches.length===1&&!joystickActive){
          cameraYaw-=e.touches[0].movementX*0.004||0;
          cameraPitch-=e.touches[0].movementY*0.004||0;
          cameraPitch=Math.max(-1.2,Math.min(0.8,cameraPitch));
        }
      }
    },{passive:false});
    
    document.getElementById('start-btn').addEventListener('click',()=>{
      currentState=State.WAITING;
      bottomPanel.innerHTML='<div style="text-align:center;color:white;padding:30px;"><div style="font-size:2rem;font-weight:900;color:#ffaa00;" id="timer-display">30</div><div style="margin:10px;">Jugadores: 50/50</div><button class="start-btn" id="cancel-waiting" style="background:gray;">CANCELAR</button></div>';
      let sec=30;
      const timerEl=document.getElementById('timer-display');
      const interval=setInterval(()=>{
        sec--; timerEl.textContent=sec;
        if(sec<=0){clearInterval(interval); startPlane();}
      },1000);
      document.getElementById('cancel-waiting').onclick=()=>{
        clearInterval(interval);
        location.reload();
      };
    });
    
    document.getElementById('menu-tienda').addEventListener('click',()=>alert('🛒 TIENDA - Próximamente'));
    document.getElementById('menu-luck').addEventListener('click',()=>alert('🎰 LUCK ROYALE - ¡Gira la ruleta!'));
    document.getElementById('menu-pase').addEventListener('click',()=>alert('👑 PASE BOOYAH - Temporada 1'));
    document.getElementById('menu-misiones').addEventListener('click',()=>alert('📋 MISIONES DIARIAS'));
    document.getElementById('menu-eventos').addEventListener('click',()=>alert('🎪 EVENTOS ESPECIALES'));
    
    window.addEventListener('resize',()=>{
      camera.aspect=window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth,window.innerHeight);
    });
    
    function updateGame(delta){
      if(currentState===State.PLAYING&&playerModel){
        const speed=6;
        const forward=new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        const right=new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        const dir=forward.clone().multiplyScalar(-moveInput.y).add(right.clone().multiplyScalar(moveInput.x));
        if(dir.length()>0){dir.normalize(); localPlayer.position.x+=dir.x*speed*delta; localPlayer.position.z+=dir.z*speed*delta;}
        
        if(!localPlayer.onGround){
          if(localPlayer.parachuteOpen){
            localPlayer.velocity.y=-2.2;
            if(moveInput.x!==0||moveInput.y!==0){localPlayer.position.x+=dir.x*4*delta; localPlayer.position.z+=dir.z*4*delta;}
            if(localPlayer.position.y<=1.5){localPlayer.position.y=1.5; localPlayer.onGround=true; localPlayer.parachuteOpen=false; if(parachuteModel){scene.remove(parachuteModel); parachuteModel=null;}}
          }else{
            localPlayer.velocity.y-=9.8*delta;
            localPlayer.position.y+=localPlayer.velocity.y*delta;
            if(localPlayer.position.y<=0.15){localPlayer.position.y=0.15; localPlayer.onGround=true;}
          }
          localPlayer.position.y+=localPlayer.velocity.y*delta;
        }
        playerModel.position.copy(localPlayer.position);
        if(parachuteModel){parachuteModel.position.copy(playerModel.position); parachuteModel.position.y+=2.8;}
        
        const camOff=new THREE.Vector3(0,3.5,-6.5).applyAxisAngle(new THREE.Vector3(0,1,0),cameraYaw);
        camera.position.lerp(playerModel.position.clone().add(camOff),0.25);
        camera.lookAt(playerModel.position.x,playerModel.position.y+1.6,playerModel.position.z);
      }
      if(currentState===State.PLANE&&planeGroup){
        planeGroup.position.x+=0.9; planeGroup.position.z+=0.9;
        if(planeGroup.position.x>55) planeGroup.position.x=-55;
        if(planeGroup.position.z>55) planeGroup.position.z=-55;
        camera.position.lerp(planeGroup.position.clone().add(new THREE.Vector3(0,8,15)),0.15);
        camera.lookAt(planeGroup.position);
      }
      if(currentState===State.PLAYING||currentState===State.PLANE){
        ctxMinimap.clearRect(0,0,150,150);
        ctxMinimap.fillStyle='#2d5a27'; ctxMinimap.beginPath(); ctxMinimap.arc(75,75,70,0,Math.PI*2); ctxMinimap.fill();
        if(playerModel&&currentState===State.PLAYING){
          const px=75+(localPlayer.position.x/100)*60, py=75+(localPlayer.position.z/100)*60;
          ctxMinimap.fillStyle='#ffaa00'; ctxMinimap.beginPath(); ctxMinimap.arc(px,py,6,0,2*Math.PI); ctxMinimap.fill();
        }
      }
    }
    
    function animate(){
      requestAnimationFrame(animate);
      updateGame(0.016);
      renderer.render(scene,camera);
    }
    
    createWorld();
    setupLobby();
    animate();
  </script>
</body>
</html>
